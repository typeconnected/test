upload_max_filesize = 64M
post_max_size = 64M
memory_limit = 256M
max_execution_time = 120
max_input_time = 120
max_input_vars = 5000

date.timezone = UTC

expose_php = Off

session.cookie_httponly = 1
session.cookie_secure = 1
session.use_strict_mode = 1

display_errors = Off
log_errors = On
error_log = /dev/stderr
